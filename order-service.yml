server:
  port: 8082

spring:
  application:
    name: ORDER-SERVICE

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:mysql://localhost:3306/order_db
    username: root
    password: Root@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/