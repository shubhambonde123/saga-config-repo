##local Run
server:
 port: 8084

spring:
 application:
   name: ORDER-SERVICE

 datasource:
   url: jdbc:mysql://localhost:3306/order_db
   username: root
   password: Root@1234
   driver-class-name: com.mysql.cj.jdbc.Driver

 jpa:
   hibernate:
     ddl-auto: update
   show-sql: true

eureka:
 client:
   register-with-eureka: true
   fetch-registry: true
   service-url:
     defaultZone: http://localhost:8761/eureka/






