server:
  port: 8084

spring:
  application:
    name: INVENTORY-SERVICE

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db
    username: root
    password: Root@1234
    
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
